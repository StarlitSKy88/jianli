deployment_notes: |
  生产部署时需在 EdgeOne / Vercel 环境变量加：
  - TURNSTILE_SECRET_KEY=<your-secret>（Cloudflare 控制台拿）
  - TURNSTILE_SITE_KEY=<your-site-key>（前端 widget 用）
  - DISABLE_RATE_LIMIT=0（明确禁用旁路）
  - 多实例：考虑 Redis 替代内存限流