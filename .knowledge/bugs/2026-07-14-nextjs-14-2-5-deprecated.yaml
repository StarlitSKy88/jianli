id: bug-2026-07-14-001
title: next@14.2.5 已被标记 deprecated，应升级到 14.2.32+
category: bug
severity: high
tags: [nextjs, security, dependencies]
created_at: 2026-07-14
project: interview-buddy

problem: |
  安装 next@14.2.5 时收到 warning："This version has a security vulnerability.
  Please upgrade to a patched version. See https://nextjs.org/blog/security-update-2025-12-11"

  原因：Next.js 14.2.5 之前的版本有 CVE-2025-XXXX 安全漏洞。

solution: |
  立即升级到 14.2.32 或更高（最安全是 14.2.35+）。

  修复命令：
  ```bash
  pnpm add next@^14.2.32
  ```

  验证：
  ```bash
  pnpm list next
  # 应显示 next@14.2.35
  ```

  预防：
  - CI 加 `pnpm audit` 失败即阻断
  - Dependabot 每周自动升级
  - 锁文件必须提交（pnpm-lock.yaml）

verification:
  install: pnpm list next → 14.2.35
  lint: pnpm lint pass
  type_check: pnpm type-check pass
  audit: pnpm audit → 0 vulnerabilities (CVE-2025-XXXX 已修复)

learned_from:
  - task: Phase 0.4
  - file: package.json
  - commit: (待提交)

related:
