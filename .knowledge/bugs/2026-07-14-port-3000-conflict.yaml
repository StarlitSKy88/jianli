id: bug-2026-07-14-002
title: pnpm dev 时端口 3000 被占用，Next.js 自动换 3001
category: bug
severity: low
tags: [nextjs, dev, port]
created_at: 2026-07-14
project: interview-buddy

problem: |
  pnpm dev 后浏览器访问 http://localhost:3000 返回 500，但服务已启动。
  实际服务跑在 3001 端口。

  根因：之前的进程（reinvention-suite 旧 dev server）仍占用 3000 端口。

solution: |
  选择其一：
  1. kill 旧进程：
     ```bash
     lsof -ti:3000 | xargs kill -9
     pnpm dev
     ```
  2. 指定新端口：
     ```bash
     pnpm dev -- -p 3010
     ```
  3. 验证时用实际端口：
     ```bash
     curl -s -o /dev/null -w "%{http_code}" http://localhost:3001
     ```

  自动化检测（未来可在 pre-commit 加）：
  ```bash
  ! lsof -i:3000 > /dev/null 2>&1 || echo "⚠️ Port 3000 已被占用"
  ```

verification:
  curl_200: curl -s -o /dev/null -w "%{http_code}" http://localhost:3001 → 200
  page_content: curl -s http://localhost:3001 | grep -o "Interview Buddy"

