id: bug-2026-07-15-007
title: 面试官 message API 永不接收用户真实回答（history slice bug + 简历硬编码空）
category: bug
severity: critical
tags: [interviewer, message-api, history, resume, ai-context, ssr]
created_at: 2026-07-15
project: interview-buddy

problem: |
  Phase 14.2 压测发现：30 轮连续对话，AI 返回的内容永远是"请介绍最近做过的项目"
  这类与上下文无关的初始问题。30 轮里 AI 完全无视用户的"我是38岁10年Go后端"等真实回答。

  根因：
  1. app/api/interview/[id]/message/route.ts:130 — `history: body.data.messages.slice(0, -1)`
     剔除了最后一条用户消息，所以用户真实回答永远到不了 AI。
  2. 同文件 124-128 — 简历硬编码 `{ name: 'anonymous', yearsOfExperience: 0, skills: [], projects: [] }`
     完全忽略数据库里真实的简历信息。
  3. lib/agents/interviewer/index.ts:82-85 — buildMessages 末尾追加固定 "请按 system prompt 中规定的 JSON schema 继续提问"
     这个 user 消息替代了真实用户的回答。

  后果：30 轮对话中 AI 像失忆一样反复问同样的开场白。完全失去"深度面试"价值。

solution: |
  修复 1：route.ts 不再 slice，history = body.data.messages
  修复 2：route.ts 从 interview.resume 读真实 yearsOfExperience / techStack / projects
  修复 3：Interviewer.buildMessages 末尾不再追加固定 user 消息，让 history 最后一条自然成为 user 输入

  代码 diff：app/api/interview/[id]/message/route.ts
  ```diff
  - history: body.data.messages.slice(0, -1),
  + history: body.data.messages, // 全部消息传给 AI
  ```
  ```diff
  resume: {
    name: interview.resume.name || 'anonymous',
  - yearsOfExperience: 0,
  - skills: [],
  - projects: [],
  + yearsOfExperience: interview.resume.yearsOfExperience || 0,
  + skills: Array.isArray(interview.resume.techStack) ? interview.resume.techStack as string[] : [],
  + projects: (interview.resume.parsed?.projects ?? []).map(p => ({
  +   name: p.name || 'unknown',
  +   duration: '',
  +   description: p.description || '',
  +   techStack: Array.isArray(p.techStack) ? p.techStack : [],
  + })),
  },
  ```

  测试覆盖：
  - type-check: 0 errors
  - 实测：连续 5 轮对话，每轮 AI 根据用户上轮回答提出跟进问题（不重复开场白）
  - 简历项目名/技能出现在 AI 问题里

  自动化测试建议：tests/e2e/interview-context.spec.ts 加 5 轮对话，断言 AI 第 2-5 轮的问题包含用户上轮回答中的关键词。

verification:
  type_check: 0 errors
  e2e: 30/30 轮 HTTP 200，AI 回复质量上下文相关
  stress: phase-14-2 跑通后归档 .stress14.2-r-* 内容供 subagent 评审

learned_from:
