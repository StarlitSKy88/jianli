# 教训

**烟雾测试前永远先杀进程 + 清 .next** — 否则你测的根本不是 prod build，是被旧 dev 污染的 500。

**prod 必须显式 `PORT=xxxx`** — Vercel 自动注入，Docker 必须显式 env，否则和 dev/Playwright 抢端口。

**后台启动后 `head -3` 验证日志** — 而不是直接 curl，curl 可能命中错端口的旧进程。

**`Cannot find module './XXX.js'` 99% 是 .next 缓存损坏** — 删了重建，永远不要尝试 patch webpack-runtime.js。